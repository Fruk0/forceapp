<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0F0F0F">
<title>ForceApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
html {
  height: 100%;
  height: -webkit-fill-available;
}
:root{
  --bg:#0F0F0F;
  --s1:#181818;
  --s2:#212121;
  --s3:#2A2A2A;
  --b:rgba(255,255,255,0.07);
  --b2:rgba(255,255,255,0.12);
  --b3:rgba(255,255,255,0.18);
  --y:#FFD000;
  --y10:rgba(255,208,0,0.10);
  --y20:rgba(255,208,0,0.20);
  --y35:rgba(255,208,0,0.35);
  --g:#5DD62C;
  --g10:rgba(93,214,44,0.10);
  --g20:rgba(93,214,44,0.20);
  --o:#F97316;
  --o10:rgba(249,115,22,0.10);
  --r:#F87171;
  --r10:rgba(248,113,113,0.10);
  --tx:#F2F2F2;
  --tx2:#C8C8C8;
  --tx3:#737373;
  --f:'Barlow',-apple-system,sans-serif;
  --fd:'Bebas Neue','Barlow',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);height:100%;}
body{
  font-family:var(--f);background:var(--bg);color:var(--tx);
  position:fixed;top:0;left:0;right:0;bottom:0;
  width:100%;max-width:430px;margin:0 auto;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;display:flex;flex-direction:column;
  overscroll-behavior:none;
}

/* ── HDR ── */
.hdr{
  flex-shrink:0;z-index:50;
  background:rgba(15,15,15,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b);
  padding:14px 20px 13px;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr-logo{display:flex;align-items:center;gap:9px;}
.hdr-icon{
  width:30px;height:30px;border-radius:9px;
  background:var(--y10);border:1px solid var(--y20);
  display:flex;align-items:center;justify-content:center;
}
.hdr-name{font-size:22px;font-weight:400;letter-spacing:3px;color:var(--tx);font-family:var(--fd);text-transform:uppercase;}
.hdr-name span{color:var(--y);}
.hdr-date{font-size:12px;color:#909090;letter-spacing:0.2px;}

/* ── NAV ── */
.nav{
  width:100%;max-width:430px;
  background:rgba(15,15,15,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--b);
  display:flex;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:50;
}
.nav-btn{
  flex:1;padding:13px 4px 14px;background:none;border:none;
  color:var(--tx3);font-family:var(--f);
  font-size:10px;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:color 0.15s;
  letter-spacing:0.8px;text-transform:uppercase;
}
.nav-btn svg{width:22px;height:22px;stroke-width:1.6;}
.nav-btn.active{color:var(--y);}

/* ── SCREENS ── */
.screen{display:none;padding:18px 20px 32px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen.active{display:block;flex:1;min-height:0;height:0;}

/* ── CARD ── */
.card{
  background:var(--s1);
  border:1px solid var(--b);
  border-radius:18px;
  margin-bottom:12px;
  overflow:hidden;
}
.cp{padding:18px 20px;}

/* ── EYEBROW ── */
.ey{
  font-size:10px;font-weight:500;
  letter-spacing:1.8px;text-transform:uppercase;color:var(--tx3);
}

/* ── SEPARADOR ── */
.sep{height:1px;background:var(--b);}

/* ── RACHA ── */
.racha{
  background:var(--s1);
  border:1px solid rgba(255,208,0,0.1);
  border-radius:20px;padding:22px;
  margin-bottom:14px;
  position:relative;overflow:hidden;
}
.racha-glow{
  position:absolute;top:-80px;left:-50px;
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(255,208,0,0.055) 0%,transparent 65%);
  pointer-events:none;
}
.racha-num{font-size:68px;font-weight:400;color:var(--y);line-height:1;letter-spacing:2px;font-family:var(--fd);}
.racha-unit{
  font-size:16px;font-weight:300;
  color:rgba(255,208,0,0.45);
  letter-spacing:0;padding-bottom:8px;
}
.racha-msg1{font-size:15px;font-weight:500;color:#D0D0D0;line-height:1.5;}
.racha-msg2{font-size:13px;color:#888;margin-top:5px;}
.racha-track{
  height:3px;background:rgba(255,255,255,0.05);
  border-radius:3px;overflow:hidden;margin-top:16px;
}
.racha-fill{height:100%;background:rgba(255,208,0,0.5);border-radius:3px;transition:width .5s ease;}
.racha-sub{display:flex;justify-content:space-between;margin-top:6px;}
.racha-sub span{font-size:10px;color:var(--tx3);}

/* ── DÍA ── */
.dia-day{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:7px;}
.dia-title{font-size:24px;font-weight:400;letter-spacing:1.5px;color:var(--tx);line-height:1.2;font-family:var(--fd);text-transform:uppercase;}
.dia-sep{color:var(--tx3);font-weight:300;margin:0 4px;}
.prog-track{height:3px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:14px;}
.prog-fill{height:100%;background:var(--y);border-radius:3px;opacity:.95;transition:width .4s ease;}
.prog-stat{display:flex;align-items:baseline;gap:4px;}
.prog-stat-n{font-size:22px;font-weight:400;letter-spacing:1.5px;font-family:var(--fd);}
.prog-stat-n.y{color:var(--y);}
.prog-stat-n.w{color:var(--tx);}
.prog-stat-l{font-size:12px;color:var(--tx3);}
.manana{display:flex;align-items:center;gap:7px;padding:10px 14px;margin:0 0 12px;background:var(--s1);border:1px solid var(--b);border-radius:12px;cursor:pointer;transition:opacity .15s;}
.manana span{font-size:13px;color:var(--tx3);flex:1;}

/* ── SESIÓN COMPLETADA ── */
.done-screen{
  background:var(--s1);
  border:1px solid rgba(93,214,44,0.12);
  border-radius:22px;padding:0;margin-bottom:10px;
  overflow:hidden;
  position:relative;
}
.done-hero{
  padding:40px 28px 32px;text-align:center;
  background:linear-gradient(180deg,rgba(93,214,44,0.05) 0%,transparent 100%);
  position:relative;
}
.done-hero::before{
  content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(93,214,44,0.07) 0%,transparent 65%);
  pointer-events:none;
}
.done-icon{
  width:80px;height:80px;border-radius:26px;
  background:rgba(93,214,44,0.1);border:1px solid rgba(93,214,44,0.22);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 22px;position:relative;z-index:1;
}
.done-title{font-size:26px;font-weight:400;color:var(--tx);letter-spacing:3px;font-family:var(--fd);text-transform:uppercase;margin-bottom:8px;position:relative;z-index:1;}
.done-sub{font-size:14px;color:var(--tx2);line-height:1.6;position:relative;z-index:1;}
.done-body{padding:0 20px 24px;}
.done-resumen{margin-bottom:18px;}
.done-resumen-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--b);
  font-size:14px;
}
.done-resumen-row:last-child{border:none;}
.done-resumen-row span:first-child{color:var(--tx2);}
.done-resumen-row span:last-child{color:var(--tx);font-weight:400;font-family:var(--fd);letter-spacing:0.5px;}
.done-manana{
  background:var(--s2);border:1px solid var(--b2);
  border-radius:14px;padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:opacity .15s;
}
.done-manana:active{opacity:.75;}
.done-edit-btn{
  width:100%;padding:13px;border-radius:13px;
  background:transparent;border:1px solid var(--b2);
  font-family:var(--f);font-size:13px;font-weight:500;color:var(--tx3);
  cursor:pointer;transition:all .15s;margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.done-edit-btn:active{background:var(--s2);color:var(--tx);}
.done-edit-btn svg{width:14px;height:14px;}

/* MODAL PREVIEW MAÑANA */
.manana-preview-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:200;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.manana-preview-modal.open{opacity:1;pointer-events:all;}
.manana-preview-sheet{
  width:100%;max-width:430px;margin:0 auto;
  background:#1A1A1A;border-radius:24px 24px 0 0;
  border-top:1px solid var(--b2);
  padding:22px 20px 36px;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.manana-preview-modal.open .manana-preview-sheet{transform:translateY(0);}
.manana-preview-ej{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--b);
  font-size:14px;
}
.manana-preview-ej:last-child{border:none;}
.manana-preview-ej-name{color:var(--tx2);}
.manana-preview-ej-obj{color:var(--tx3);font-size:12px;}
.done-manana-lbl{font-size:10px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.done-manana-txt{font-size:15px;font-weight:500;color:var(--tx);}


/* ── EJ CARDS ── */
.ej{
  background:var(--s1);
  border:1px solid var(--b);
  border-left:2.5px solid transparent;
  border-radius:16px;margin-bottom:10px;overflow:hidden;
  transition:border-left-color .2s;
}
.ej.active{border-color:var(--b2);border-left-color:rgba(255,208,0,0.6);}
.ej.done-up{border-left-color:rgba(93,214,44,0.55);}
.ej.done-hold{border-left-color:rgba(249,115,22,0.5);}
.ej.done-rev{border-left-color:rgba(248,113,113,0.5);}
.ej.pending{
  background:var(--s1);
  border-color:var(--b);
  border-left-color:transparent;
  opacity:1 !important;
}
.ej.soga-done{border-left-color:rgba(93,214,44,0.45);}

.ej-hdr{
  padding:15px 18px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
}
.ej-dot{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--tx3);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.ej-dot.done{border-color:rgba(93,214,44,0.5);}
.ej-n{flex:1;font-size:15px;font-weight:500;color:var(--tx);letter-spacing:0;}
.ej-n.done{color:var(--tx3);text-decoration:line-through;}
.ej-badge{
  font-size:10px;color:var(--y);background:var(--y10);
  padding:3px 9px;border-radius:20px;border:1px solid rgba(255,208,0,0.15);
}
.ej-obj{font-size:12px;color:#848484;}

.ej-body{padding:0 20px 22px;display:none;}
.ej.active .ej-body,
.ej.done-up .ej-body,
.ej.done-hold .ej-body,
.ej.done-rev .ej-body{display:block;}
.ej-div{height:1px;background:var(--b);margin:0 0 20px;}


/* PESO */
.field-lbl{font-size:11px;color:#848484;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:12px;text-align:center;}
.field-hint{font-size:12px;color:#848484;margin-top:8px;text-align:center;}
.peso-row{display:flex;align-items:center;justify-content:center;gap:12px;}
.peso-input{
  background:transparent;border:none;border-bottom:2px solid var(--b2);
  border-radius:0;color:var(--y);font-family:var(--fd);
  font-size:56px;font-weight:400;letter-spacing:3px;
  width:130px;padding:4px 8px 8px;outline:none;text-align:center;
  -moz-appearance:textfield;transition:border-color .15s;
}
.peso-input::-webkit-inner-spin-button,.peso-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.peso-input:focus{border-bottom-color:var(--y35);}
.peso-input::placeholder{color:var(--tx3);}
.peso-input.suggested{color:rgba(255,208,0,0.45);}
.peso-unit{font-size:12px;font-weight:400;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-top:6px;display:block;}
.peso-adj{
  width:40px;height:40px;border-radius:50%;
  background:var(--s2);border:1px solid var(--b2);
  font-family:var(--f);font-size:22px;font-weight:300;color:var(--tx3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .15s;
  -webkit-user-select:none;user-select:none;
}
.peso-adj:active{background:var(--s3);color:var(--tx);}

/* REPS */
.reps-grid{display:flex;gap:8px;flex-wrap:nowrap;justify-content:center;margin-bottom:20px;width:100%;overflow:hidden;}
.rep-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
.rep-input{
  background:var(--s2);border:1.5px solid var(--b2);
  border-radius:12px;color:var(--tx);font-family:var(--fd);
  font-size:26px;font-weight:400;letter-spacing:1px;
  width:100%;padding:13px 4px;text-align:center;outline:none;
  -moz-appearance:textfield;transition:border-color .15s;
}
.rep-input::-webkit-inner-spin-button,.rep-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.rep-input:focus{border-color:rgba(255,208,0,0.45);}
.rep-input::placeholder{color:var(--tx3);}
.rep-lbl{font-size:10px;color:#848484;letter-spacing:0.5px;text-transform:uppercase;}

/* SENSACIÓN */
.sens-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
.sens-btn{
  padding:16px 10px;border-radius:14px;
  border:1.5px solid var(--b2);background:var(--s2);
  font-family:var(--f);font-size:15px;font-weight:400;color:#B8B8B8;
  cursor:pointer;text-align:center;transition:all .15s;letter-spacing:-0.1px;
}
.sens-btn:active{transform:scale(.97);}
.sens-btn.sel-facil{border-color:rgba(93,214,44,0.45);background:var(--g10);color:rgba(93,214,44,0.9);font-weight:600;}
.sens-btn.sel-bien{border-color:var(--y35);background:var(--y10);color:var(--y);font-weight:600;}
.sens-btn.sel-pesado{border-color:rgba(249,115,22,0.45);background:var(--o10);color:var(--o);font-weight:600;}
.sens-btn.sel-limite{border-color:rgba(248,113,113,0.45);background:var(--r10);color:var(--r);font-weight:600;}

/* MOLESTIA */
.mol-row{display:flex;gap:10px;margin-bottom:22px;}
.mol-btn{
  flex:1;padding:16px 10px;border-radius:14px;
  border:1.5px solid var(--b2);background:var(--s2);
  font-family:var(--f);font-size:15px;font-weight:400;color:#B8B8B8;
  cursor:pointer;text-align:center;transition:all .15s;
}
.mol-btn.sel-no{border-color:rgba(93,214,44,0.4);background:var(--g10);color:rgba(93,214,44,0.85);font-weight:600;}
.mol-btn.sel-si{border-color:rgba(248,113,113,0.4);background:var(--r10);color:var(--r);font-weight:600;}

/* COMPLETAR */
.completar-btn{
  width:100%;padding:18px;border-radius:18px;
  background:rgba(255,208,0,0.10);border:1.5px solid rgba(255,208,0,0.3);
  font-family:var(--fd);font-size:17px;font-weight:400;color:var(--y);
  letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.completar-btn:active{opacity:.8;transform:scale(.99);}

/* ESTADO */
.estado{
  margin-bottom:14px;padding:14px 16px;border-radius:12px;
  display:flex;align-items:flex-start;gap:12px;
  font-size:14px;line-height:1.55;
}
.estado svg{width:18px;height:18px;flex-shrink:0;margin-top:1px;}
.estado.up{background:var(--g10);border:1px solid var(--g20);color:rgba(93,214,44,0.9);}
.estado.hold{background:var(--o10);border:1px solid rgba(249,115,22,0.18);color:rgba(249,115,22,0.9);}
.estado.rev{background:var(--r10);border:1px solid rgba(248,113,113,0.2);color:var(--r);}

/* MOLESTIA GLOBAL */
.mol-global{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 22px;border-radius:24px;
  border:1px solid rgba(248,113,113,0.25);background:rgba(248,113,113,0.04);
  font-family:var(--f);font-size:13px;font-weight:500;color:rgba(248,113,113,0.6);
  margin:0 auto 16px;cursor:pointer;transition:all .15s;
}
.mol-global.active{border-color:rgba(248,113,113,0.5);background:var(--r10);color:var(--r);}
.mol-global svg{width:15px;height:15px;}

/* MODAL */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:200;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal.open{opacity:1;pointer-events:all;}
.modal-sheet{
  width:100%;max-width:430px;margin:0 auto;
  background:#1A1A1A;border-radius:24px 24px 0 0;
  border-top:1px solid var(--b2);padding:24px 20px 38px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.modal.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--tx3);border-radius:2px;margin:0 auto 22px;}
.modal-title{font-size:17px;font-weight:600;color:var(--tx);margin-bottom:18px;}
.mol-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
.mol-opt{
  padding:16px;border-radius:14px;border:1.5px solid var(--b2);background:var(--s2);
  font-family:var(--f);font-size:15px;font-weight:500;color:var(--tx2);
  cursor:pointer;text-align:center;transition:all .15s;
}
.mol-opt:active{transform:scale(.97);}
.mol-opt.sel{border-color:rgba(248,113,113,0.45);background:var(--r10);color:var(--r);}
.mol-nota{
  width:100%;background:var(--s2);border:1.5px solid var(--b2);
  border-radius:13px;color:var(--tx);font-family:var(--f);
  font-size:15px;padding:14px 16px;outline:none;
  resize:none;min-height:74px;margin-bottom:16px;
  transition:border-color .15s;
}
.mol-nota:focus{border-color:rgba(248,113,113,0.35);}
.mol-nota::placeholder{color:var(--tx3);}

/* RUNNING */
.run-tipo{font-size:26px;font-weight:400;letter-spacing:2px;font-family:var(--fd);text-transform:uppercase;margin:8px 0 10px;}
.run-desc{font-size:14px;color:var(--tx2);line-height:1.65;}
.run-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px 20px;}
.run-field label{display:block;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px;}
.run-input{
  width:100%;background:var(--s2);border:1.5px solid var(--b2);
  border-radius:13px;color:var(--tx);font-family:var(--f);
  font-size:24px;font-weight:300;padding:13px 14px;outline:none;
  -moz-appearance:textfield;transition:border-color .15s;letter-spacing:-0.5px;
}
.run-input::-webkit-inner-spin-button,.run-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.run-input:focus{border-color:var(--y35);}
.run-input::placeholder{color:var(--tx3);}
.run-unit{font-size:12px;color:#848484;display:block;margin-top:5px;}

.rsens-row{display:flex;gap:7px;padding:0 20px 18px;}
.rsens-btn{
  flex:1;padding:13px 4px;border-radius:12px;
  border:1.5px solid var(--b2);background:var(--s2);
  font-family:var(--f);font-size:13px;font-weight:400;color:#888;
  cursor:pointer;text-align:center;transition:all .15s;
}
.rsens-btn.sel{border-color:var(--y35);background:var(--y10);color:var(--y);font-weight:600;}

/* ENERGÍA */
/* energía — solo en modal, no como card inline */
.en-btn{
  padding:16px 8px;border-radius:14px;
  border:1.5px solid var(--b2);background:var(--s2);
  font-family:var(--f);font-size:15px;color:#A0A0A0;
  cursor:pointer;text-align:center;transition:all .15s;
}
.en-btn:active{transform:scale(.97);}
.en-btn.sel-exc{border-color:rgba(93,214,44,0.45);background:var(--g10);color:rgba(93,214,44,0.9);font-weight:600;}
.en-btn.sel-bien{border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.05);color:var(--tx);font-weight:600;}
.en-btn.sel-can{border-color:rgba(249,115,22,0.45);background:var(--o10);color:var(--o);font-weight:600;}
.en-btn.sel-muy{border-color:rgba(248,113,113,0.45);background:var(--r10);color:var(--r);font-weight:600;}

/* peso sugerido con contexto */
.peso-rec{
  font-size:13px;font-weight:500;padding:8px 14px;
  border-radius:20px;display:inline-flex;align-items:center;gap:6px;
  margin-bottom:6px;
}
.peso-rec.up{background:rgba(93,214,44,0.1);color:rgba(93,214,44,0.85);border:1px solid rgba(93,214,44,0.2);}
.peso-rec.hold{background:rgba(255,208,0,0.08);color:rgba(255,208,0,0.7);border:1px solid rgba(255,208,0,0.15);}
.peso-rec.none{color:var(--tx3);font-size:12px;background:none;border:none;padding:4px 0;}

.nota-input{
  width:100%;background:var(--s2);border:1px solid var(--b2);
  border-radius:12px;color:var(--tx);font-family:var(--f);
  font-size:15px;padding:13px 15px;outline:none;transition:border-color .15s;
}
.nota-input:focus{border-color:var(--b3);}
.nota-input::placeholder{color:var(--tx3);}

/* BTN SAVE */
.btn-save{
  width:100%;padding:18px;background:var(--y);border:none;border-radius:18px;
  font-family:var(--fd);font-size:18px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:#0D0D0D;
  cursor:pointer;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-save:active{opacity:.85;transform:scale(.99);}
.btn-save svg{width:17px;height:17px;}

.soga-btn{
  width:100%;padding:17px 20px;background:transparent;border:none;
  font-family:var(--f);font-size:15px;font-weight:500;
  color:var(--tx2);text-align:left;cursor:pointer;
}

/* TOOLS */
.tools-row{display:flex;gap:9px;margin-top:14px;}
.tool-btn{
  flex:1;padding:15px 10px;background:var(--s1);border:1px solid var(--b2);
  border-radius:16px;font-family:var(--f);font-size:13px;font-weight:500;color:#909090;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;
}
.tool-btn svg{width:15px;height:15px;}
.tool-btn:active{background:var(--s2);}

/* ── PROGRESO ── */
.p-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:16px;font-weight:600;}

/* CALENDARIO CIRCULAR */
.cal-lbl{flex:1;text-align:center;font-size:10px;color:#686868;font-weight:500;letter-spacing:0.5px;}
.cal-row{display:flex;align-items:center;gap:4px;margin-bottom:4px;}
.cal-cell{
  flex:1;aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:500;color:var(--tx3);
  background:#1A1A1A;
  position:relative;
}
.cal-done{background:transparent;border:2px solid rgba(100,160,255,0.7);}
.cal-done-run{background:transparent;border:2px solid rgba(93,214,44,0.7);}
.cal-libre{background:transparent;border:1.5px solid rgba(255,208,0,0.3);color:rgba(255,208,0,0.5);font-size:10px;font-weight:500;}
.cal-today{background:transparent;border:2px solid rgba(255,255,255,0.5);color:var(--tx);font-weight:600;transition:all .15s;}
.cal-past{background:#1A1A1A;color:#555;}
.cal-fut{background:transparent;color:#333;}
.cal-empty{background:transparent;}
.cal-streak-cell{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;gap:1px;flex-direction:column;
}
.cal-streak-done{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.08);}
.cal-streak-fire{background:rgba(255,208,0,0.08);border:1px solid rgba(255,208,0,0.15);}
.cal-streak-empty{background:rgba(255,255,255,0.03);}

/* DASH 30 */
.dash-row{margin-bottom:14px;}
.dash-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.dash-name{font-size:14px;color:#C0C0C0;}
.s-up{font-size:12px;color:rgba(93,214,44,0.8);font-weight:500;}
.s-mid{font-size:12px;color:rgba(255,208,0,0.7);font-weight:500;}
.s-dn{font-size:12px;color:rgba(249,115,22,0.8);font-weight:500;}
.d-track{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.d-fill-g{height:100%;background:rgba(93,214,44,0.5);border-radius:2px;}
.d-fill-y{height:100%;background:rgba(255,208,0,0.5);border-radius:2px;}

/* ADHERENCIA */
.adh-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.adh-n{font-size:13px;color:#C0C0C0;width:54px;flex-shrink:0;}
.adh-t{flex:1;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.adh-f{height:100%;background:var(--y);border-radius:2px;}
.adh-num{font-size:11px;color:var(--tx3);width:26px;text-align:right;}

/* PRINCIPALES */
.pr-row{padding:14px 0;border-bottom:1px solid var(--b);cursor:pointer;}
.pr-row:last-child{border:none;}
.pr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pr-name{font-size:14px;color:#C0C0C0;}
.pr-kg{font-size:19px;font-weight:400;color:var(--tx);letter-spacing:1px;font-family:var(--fd);}
.pr-badge{font-size:10px;color:var(--y);background:var(--y10);padding:3px 8px;border-radius:10px;border:1px solid rgba(255,208,0,0.2);margin-left:8px;}
.histo{display:flex;gap:4px;align-items:flex-end;height:26px;}
.hb{flex:1;background:rgba(255,208,0,0.6);border-radius:3px 3px 0 0;}

/* RUNNING STATS */
.rstat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--b);border-radius:13px;overflow:hidden;}
.rstat-c{background:var(--s2);padding:14px 6px;text-align:center;}
.rstat-v{font-size:24px;font-weight:400;color:var(--tx);letter-spacing:1.5px;line-height:1;font-family:var(--fd);}
.rstat-l{font-size:10px;color:var(--tx3);margin-top:5px;text-transform:uppercase;letter-spacing:.5px;}

/* ENERGÍA BARS */
.en-bars{display:flex;gap:5px;align-items:flex-end;height:44px;margin-bottom:12px;}
.en-b{flex:1;border-radius:3px 3px 0 0;}
.en-leg{display:flex;gap:14px;}
.en-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* HISTORIAL */
.hist-it{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px;border-bottom:1px solid var(--b);}
.hist-it:last-child{border:none;}
.hist-title{font-size:16px;font-weight:400;color:var(--tx);margin-bottom:4px;font-family:var(--fd);letter-spacing:0.8px;}
.hist-meta{font-size:13px;color:#B8B8B8;line-height:1.5;}
.hist-r{text-align:right;flex-shrink:0;margin-left:14px;}
.hist-date{font-size:11px;color:var(--tx3);margin-bottom:6px;}
.hbadge{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;}
.hb-f{background:var(--y10);color:var(--y);border:1px solid rgba(255,208,0,0.15);}
.hb-r{background:var(--g10);color:rgba(93,214,44,0.8);border:1px solid rgba(93,214,44,0.15);}
.hb-rev{background:var(--r10);color:var(--r);border:1px solid rgba(248,113,113,0.2);}

/* PANEL SESIÓN COMPLETA */
.ses-panel{
  position:fixed;inset:0;background:var(--bg);z-index:100;
  display:none;flex-direction:column;max-width:430px;margin:0 auto;
}
.ses-panel.open{display:flex;}
.ses-panel-hdr{
  padding:16px 20px 14px;border-bottom:1px solid var(--b);
  display:flex;align-items:center;gap:14px;flex-shrink:0;
  background:rgba(15,15,15,0.97);
}

.ses-panel-scroll{flex:1;overflow-y:auto;padding:16px 20px 32px;-webkit-overflow-scrolling:touch;}
.ses-ej-row{
  background:var(--s1);border:1px solid var(--b);
  border-radius:14px;padding:14px 16px;margin-bottom:8px;
}
.ses-ej-nombre{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:6px;font-family:var(--fd);letter-spacing:0.3px;}
.ses-ej-kg{font-size:13px;color:var(--tx2);margin-bottom:4px;}
.ses-ej-reps{font-size:13px;color:var(--tx3);}
.ses-ej-est{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:12px;margin-top:6px;}
.ses-ej-est.up{background:var(--g10);color:rgba(93,214,44,0.85);border:1px solid rgba(93,214,44,0.2);}
.ses-ej-est.hold{background:var(--y10);color:rgba(255,208,0,0.75);border:1px solid rgba(255,208,0,0.18);}
.ses-ej-est.rev{background:var(--r10);color:var(--r);border:1px solid rgba(248,113,113,0.2);}

/* TOAST */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 90px);left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(28,28,28,0.96);border:1px solid rgba(93,214,44,0.35);
  color:var(--tx);padding:13px 22px;
  border-radius:30px;font-size:14px;font-weight:500;
  z-index:300;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:rgba(248,113,113,0.4);}

/* ── RINGS SEMANALES ── */
.rings-card{
  background:var(--s1);border:1px solid var(--b);
  border-radius:18px;padding:20px;margin-bottom:12px;
}
.rings-row{display:flex;align-items:center;gap:12px;}
.ring-item{
  flex:1;display:flex;flex-direction:row;
  align-items:center;gap:14px;
}
.ring-svg{flex-shrink:0;}
.ring-info{display:flex;flex-direction:column;gap:2px;}
.ring-count{font-size:32px;font-weight:400;color:var(--tx);line-height:1;letter-spacing:1.5px;font-family:var(--fd);}
.ring-count span{font-size:13px;font-weight:400;color:var(--tx3);letter-spacing:0;}
.ring-label{font-size:11px;color:var(--tx2);letter-spacing:1px;font-weight:400;text-transform:uppercase;}
.ring-divider{width:1px;height:56px;background:var(--b2);flex-shrink:0;}
.streak-week{display:flex;align-items:center;gap:14px;margin-top:18px;padding-top:18px;border-top:1px solid var(--b);}
.streak-week-num{font-size:30px;font-weight:400;color:var(--y);letter-spacing:2px;line-height:1;font-family:var(--fd);}
.streak-week-lbl{font-size:13px;color:var(--tx2);font-weight:500;}
.streak-week-sub{font-size:11px;color:var(--tx3);margin-top:3px;}

@keyframes ringPop{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
.ring-complete{animation:ringPop .4s ease;}

/* ── NO ENTRENÉ BTN ── */
.skip-btn{
  width:100%;padding:14px;border-radius:14px;
  background:transparent;border:1px solid var(--b2);
  font-family:var(--f);font-size:14px;font-weight:400;color:var(--tx3);
  cursor:pointer;transition:all .15s;margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.skip-btn:active{background:var(--s2);}
.skip-btn svg{width:15px;height:15px;}
.skip-btn.libre{
  color:rgba(255,208,0,0.6);
  border-color:rgba(255,208,0,0.2);
  background:rgba(255,208,0,0.04);
}

/* MODAL SKIP */
.skip-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}

/* RESUMEN ANTES DE GUARDAR */
.resumen-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:200;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.resumen-modal.open{opacity:1;pointer-events:all;}
.resumen-sheet{
  width:100%;max-width:430px;margin:0 auto;
  background:#1A1A1A;border-radius:24px 24px 0 0;
  border-top:1px solid var(--b2);padding:22px 20px 36px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:80dvh;overflow-y:auto;
}
.resumen-modal.open .resumen-sheet{transform:translateY(0);}
.resumen-ej{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--b);
}
.resumen-ej:last-child{border:none;}
.resumen-ej-name{font-size:14px;color:var(--tx2);}
.resumen-ej-data{text-align:right;}
.resumen-ej-kg{font-size:14px;font-weight:500;color:var(--tx);font-family:var(--fd);letter-spacing:0.5px;}
.resumen-ej-reps{font-size:11px;color:var(--tx3);margin-top:2px;}
.resumen-ej-est{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;margin-top:3px;display:inline-block;}
.resumen-ej-est.up{background:var(--g10);color:rgba(93,214,44,0.85);}
.resumen-ej-est.hold{background:var(--y10);color:rgba(255,208,0,0.75);}
.resumen-ej-est.rev{background:var(--r10);color:var(--r);}
.skip-opt{
  padding:16px;border-radius:14px;border:1.5px solid var(--b2);background:var(--s2);
  font-family:var(--f);font-size:15px;font-weight:500;color:var(--tx2);
  cursor:pointer;text-align:left;transition:all .15s;
}
.skip-opt:active{background:var(--s3);}
.skip-opt.sel{border-color:var(--b3);background:var(--s3);color:var(--tx);}

/* BTN SECONDARY */
.btn-secondary{
  width:100%;padding:15px;border-radius:14px;
  background:transparent;border:1.5px solid var(--b2);
  font-family:var(--fd);font-size:15px;font-weight:400;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--tx3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
}
.btn-secondary:active{background:var(--s2);color:var(--tx);}

/* EDITAR EJ */
.ej-edit-btn{
  font-size:11px;color:var(--tx3);background:none;border:none;
  font-family:var(--f);cursor:pointer;padding:2px 4px;
  text-decoration:underline;text-underline-offset:2px;
  transition:color .15s;
}
.ej-edit-btn:active{color:var(--tx2);}

/* ── FOCUS DE SERIE ── */
.focus-back{
  display:flex;align-items:center;gap:8px;
  background:none;border:none;color:var(--tx3);
  font-family:var(--f);font-size:13px;cursor:pointer;
  padding:0;margin-bottom:24px;letter-spacing:0.3px;
  transition:color .15s;
}
.focus-back:active{color:var(--tx2);}
.focus-back svg{width:18px;height:18px;}
.focus-ej-name{font-size:26px;font-weight:400;color:var(--tx);letter-spacing:2px;font-family:var(--fd);text-transform:uppercase;margin-bottom:6px;}
.focus-serie-lbl{font-size:13px;color:var(--tx3);letter-spacing:0.2px;margin-bottom:20px;}
.focus-prog-track{height:3px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:24px;}
.focus-prog-fill{height:100%;background:var(--y);border-radius:3px;transition:width .4s ease;}

/* peso + objetivo */
.focus-meta{display:flex;gap:12px;margin-bottom:24px;}
.focus-meta-card{
  flex:1;background:var(--s2);border:1px solid var(--b2);
  border-radius:16px;padding:16px;text-align:center;
}
.focus-meta-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.focus-meta-val{font-size:30px;font-weight:400;color:var(--tx);letter-spacing:1.5px;font-family:var(--fd);line-height:1;}
.focus-meta-val.y{color:var(--y);}
.focus-meta-unit{font-size:13px;font-weight:300;color:var(--tx3);margin-top:4px;}

/* reps input grande */
.focus-reps-card{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:20px;padding:24px 20px;margin-bottom:16px;
  text-align:center;
}
.focus-reps-lbl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;}
.focus-reps-row{display:flex;align-items:center;justify-content:center;gap:20px;}
.focus-rep-btn{
  width:52px;height:52px;border-radius:16px;
  background:var(--s2);border:1.5px solid var(--b2);
  color:var(--tx);font-size:24px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .12s;flex-shrink:0;
}
.focus-rep-btn:active{background:var(--s3);transform:scale(.93);}
.focus-reps-input{
  background:transparent;border:none;outline:none;
  font-family:var(--fd);font-size:80px;font-weight:400;
  color:var(--y);letter-spacing:2px;text-align:center;
  width:140px;-moz-appearance:textfield;
}
.focus-reps-input::-webkit-inner-spin-button,
.focus-reps-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.focus-reps-hint{font-size:12px;color:var(--tx3);margin-top:12px;}

/* última serie */
.focus-last{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:rgba(93,214,44,0.06);
  border:1px solid rgba(93,214,44,0.12);border-radius:10px;
  margin-bottom:14px;font-size:13px;color:rgba(93,214,44,0.8);
}
.focus-last svg{width:14px;height:14px;flex-shrink:0;}

/* RIR */
.focus-rir-card{
  background:var(--s1);border:1px solid var(--b);
  border-radius:14px;padding:14px 16px;margin-bottom:16px;
}
.focus-rir-lbl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.focus-rir-hint{font-size:11px;color:var(--y);margin-top:8px;display:none;}
.focus-rir-hint.show{display:block;}
.focus-rir-opts{display:flex;gap:7px;}
.focus-rir-btn{
  flex:1;padding:11px 4px;border-radius:11px;
  border:1.5px solid var(--b2);background:var(--s2);
  font-family:var(--f);font-size:13px;font-weight:500;color:var(--tx3);
  cursor:pointer;text-align:center;transition:all .15s;
}
.focus-rir-btn.sel{border-color:var(--y35);background:var(--y10);color:var(--y);font-weight:600;}



/* toast */
.focus-toast{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 16px);left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:var(--s3);border:1px solid var(--b2);
  color:var(--tx);padding:12px 20px;
  border-radius:30px;font-size:13px;font-weight:500;
  z-index:400;opacity:0;transition:all .25s;
  white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.focus-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* resumen ejercicio */
.ej-summary-card{
  background:var(--s1);border:1px solid rgba(93,214,44,0.15);
  border-radius:18px;padding:0;overflow:hidden;margin-bottom:10px;
}
.ej-summary-hero{
  background:linear-gradient(180deg,rgba(93,214,44,0.06) 0%,transparent 100%);
  padding:24px 20px 20px;text-align:center;
}
.ej-summary-icon{
  width:56px;height:56px;border-radius:18px;
  background:rgba(93,214,44,0.1);border:1px solid rgba(93,214,44,0.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
}
.ej-summary-name{font-size:22px;font-weight:400;color:var(--tx);letter-spacing:2px;font-family:var(--fd);text-transform:uppercase;margin-bottom:6px;}
.ej-summary-status{font-size:13px;color:rgba(93,214,44,0.8);font-weight:500;}
.ej-summary-body{padding:0 20px 20px;}
.ej-summary-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--b);font-size:14px;
}

.ej-summary-row span:last-child{color:var(--tx);font-weight:500;}
.ej-summary-rec{

  margin:14px 0 16px;font-size:13px;color:var(--tx2);line-height:1.6;
}

/* ═══════════════ ANIMACIONES PREMIUM ═══════════════ */

/* Entrada suave de cards al cargar */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes scaleIn {
  from { opacity:0; transform:scale(0.94); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes slideRight {
  from { opacity:0; transform:translateX(-10px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes pulseGreen {
  0%   { box-shadow:0 0 0 0 rgba(93,214,44,0.4); }
  70%  { box-shadow:0 0 0 8px rgba(93,214,44,0); }
  100% { box-shadow:0 0 0 0 rgba(93,214,44,0); }
}
@keyframes barFill {
  from { width:0%; }
}
@keyframes ringPop {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.12); }
  100% { transform:scale(1); }
}
@keyframes slideUp {
  from { transform:translateY(100%); }
  to   { transform:translateY(0); }
}
@keyframes numberPop {
  0%   { transform:scale(1); }
  50%  { transform:scale(1.06); }
  100% { transform:scale(1); }
}

/* Cards — entrada escalonada */
.racha       { animation:fadeUp .35s ease both; }
.card        { animation:fadeUp .4s ease both; }
.ej-partial  { animation:none; } /* sin animación en updates parciales */
.ej          { animation:fadeUp .3s ease both; }
.no-anim .ej, .no-anim .card, .no-anim .racha, .no-anim .rings-card { animation:none !important; transition:none !important; }
body.no-anim *, body.no-anim *::before, body.no-anim *::after { animation:none !important; transition:none !important; }
.rings-card  { animation:fadeUp .3s ease both; }

/* Stagger para ejercicios */
.ej:nth-child(1){ animation-delay:.05s; }
.ej:nth-child(2){ animation-delay:.10s; }
.ej:nth-child(3){ animation-delay:.15s; }
.ej:nth-child(4){ animation-delay:.18s; }
.ej:nth-child(5){ animation-delay:.21s; }
.ej:nth-child(6){ animation-delay:.24s; }
.ej:nth-child(7){ animation-delay:.27s; }
.ej:nth-child(8){ animation-delay:.30s; }

/* Barras de progreso — animación al aparecer */
.prog-fill   { animation:barFill .6s cubic-bezier(.4,0,.2,1) both; animation-delay:.3s; }
.racha-fill  { animation:barFill .8s cubic-bezier(.4,0,.2,1) both; animation-delay:.4s; }

/* Ring SVG — pop al completar sesión */
.ring-complete { animation:ringPop .5s cubic-bezier(.34,1.56,.64,1) both; }

/* Número de racha — pop suave */
.racha-num   { animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1) both; animation-delay:.2s; }

/* Done screen — entrada hero */
.done-hero   { animation:fadeIn .4s ease both; }
.done-title  { animation:fadeUp .4s cubic-bezier(.34,1.56,.64,1) both; animation-delay:.25s; }
.done-resumen{ animation:fadeUp .35s ease both; animation-delay:.3s; }
.done-manana { animation:fadeUp .35s ease both; animation-delay:.4s; }
.done-edit-btn{ animation:fadeUp .3s ease both; animation-delay:.5s; }

/* Ejercicio completado — pulso verde */
.ej.done-up  { animation:pulseGreen .6s ease both; }

/* Botón principal — micro feedback */
.btn-save    { transition:transform .12s ease, opacity .12s ease, box-shadow .2s ease; }
.btn-save:hover{ box-shadow:0 4px 20px rgba(255,208,0,0.25); }
.btn-save:active{ transform:scale(.98); opacity:.9; }

/* Botones de sensación — spring */
.sens-btn    { transition:all .18s cubic-bezier(.34,1.56,.64,1); }
.en-btn      { transition:all .18s cubic-bezier(.34,1.56,.64,1); }

/* Toast — spring entrada */
.toast.show  {
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1) both;
}

/* Modal sheets — ya tienen cubic-bezier, agregar backdrop blur */
.modal-sheet, .resumen-sheet, .manana-preview-sheet {
  backdrop-filter:blur(4px);
}

/* Cal cells — hover sutil en desktop */
.cal-cell    { transition:transform .15s ease, opacity .15s ease; }
.cal-done, .cal-done-run { cursor:pointer; }
.cal-done:active, .cal-done-run:active { transform:scale(.9); opacity:.75; }

/* Hist items — tap feedback */
.hist-it     { transition:background .15s ease; }
.hist-it:active{ background:var(--s2); }

/* PR rows — tap */
.pr-row      { transition:opacity .15s ease; }

/* Ejercicio pendiente — tap */
.ej.pending:active { opacity:.4 !important; }

/* Panel historial — entrada */
.ej-hist-view.open { animation:slideRight .25s ease both; }
.ses-panel.open    { animation:slideRight .25s ease both; }

/* Rep inputs — focus glow */
.rep-input:focus {
  box-shadow:0 0 0 2px rgba(255,208,0,0.2);
  transform:scale(1.02);
  transition:all .15s ease;
}

/* Peso input — focus */
.peso-input:focus {
  transform:scale(1.01);
  transition:transform .15s ease;
}

/* Peso adj buttons — spring */
.peso-adj { transition:all .15s cubic-bezier(.34,1.56,.64,1); }
.peso-adj:active { transform:scale(.88); }

/* Done icon — pulse cuando aparece */
@keyframes doneIconPulse {
  0%   { transform:scale(0.5); opacity:0; }
  60%  { transform:scale(1.15); opacity:1; }
  100% { transform:scale(1); }
}
.done-icon { animation:doneIconPulse .5s cubic-bezier(.34,1.56,.64,1) both; animation-delay:.05s; }

/* Completar btn — glow amarillo */
.completar-btn {
  transition:all .18s ease;
  position:relative;overflow:hidden;
}
.completar-btn::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,208,0,0.08),transparent);
  opacity:0;transition:opacity .2s ease;
}
.completar-btn:active::after { opacity:1; }
.completar-btn:active { transform:scale(.98); }

/* Skip btn hover */
.skip-btn { transition:all .18s ease; }
.skip-btn:active { transform:scale(.98); }

/* ═══════════════ UTILS ═══════════════ */
function parsePeso(v){
  if(!v&&v!==0)return 0;
  // acepta tanto "23.5" como "23,5"
  return parseFloat(String(v).replace(',','.')) || 0;
}
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function todayLbl(){return new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function weekKey(){const d=new Date();const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const s=new Date(d);s.setDate(diff);return`${String(s.getDate()).padStart(2,"0")}/${String(s.getMonth()+1).padStart(2,"0")}`}
function getWeekNumber(){
  const d=new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const y=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-y)/86400000)+1)/7);
}
function runTipo(dow){if(dow===5)return'Suave';if(dow===0)return'Fondo';const w=Math.floor(Date.now()/604800000);return RUN_TIPOS[w%3]}
function toast(m,tipo){
  const t=document.getElementById('toast');
  t.innerHTML=m;
  t.classList.remove('error');
  if(tipo==='error')t.classList.add('error');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

function isoDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,"0")+'-'+String(d.getDate()).padStart(2,"0");
}
function getRacha(){
  const d=gD();const ses=d.ses;if(!ses.length)return 0;
  let r=0;const today=new Date();today.setHours(0,0,0,0);let c=new Date(today);
  for(let i=0;i<90;i++){
    const iso=isoDate(c);
    if(ses.some(s=>s.iso===iso))r++;else if(i>0)break;
    c.setDate(c.getDate()-1);
  }return r;
}
function getScore(){
  const d=gD();const w=weekKey();const ses=d.ses.filter(s=>s.semana===w);
  const f=ses.filter(s=>s.t==='fuerza').length;
  const r=ses.filter(s=>s.t==='running').length;
  const e=ses.filter(s=>s.energia).length;
  return Math.min(Math.min(f,4)*10+Math.min(r,3)*10+Math.min(e,2)*5,100);
}
function getUlt(n){
  const d=gD();
  for(const s of d.ses){
    if(s.t!=='fuerza')continue;
    const e=(s.ejs||[]).find(e=>e.n===n);
    if(!e)continue;const kg=parsePeso(e.kg);if(kg)return{kg,fecha:s.fecha,est:e.est};
  }return null;
}
function getMej(n){
  const d=gD();let b=0;
  for(const s of d.ses){
    if(s.t!=='fuerza')continue;
    const e=(s.ejs||[]).find(e=>e.n===n);
    if(!e)continue;const kg=parsePeso(e.kg);if(kg>b)b=kg;
  }return b>0?b:null;
}

function calcEstado(i){
  const plan=(PLAN[S.dow]||[])[i];const st=S.ejs[i];if(!st||!plan)return null;
  if(!st.done)return null;
  if(S.molestia)return{tipo:'rev',msg:'No subir peso. Revisa la molestia.'};
  let reps=[];
  if(st.series&&st.series.some(function(s){return s.reps!=null;})){
    reps=st.series.slice(0,plan.s).map(function(s){return parseInt(s.reps)||0;});
  } else if(st.reps&&st.reps.some(function(r){return r;})){
    reps=st.reps.map(function(r){return parseInt(r)||0;});
  }
  if(!reps.length||reps.every(function(r){return r===0;}))return null;
  const obj=plan.rMax;const objMin=plan.rMin;
  const allMax=reps.every(function(r){return r>=obj;});
  const anyBelowMin=reps.some(function(r){return r>0&&r<objMin;});
  const lastSerie=st.series&&st.series[reps.length-1];
  const lastRir=lastSerie?lastSerie.rir:null;
  const sensOk=!st.sens||st.sens==='facil'||st.sens==='bien';
  if(anyBelowMin)return{tipo:'rev',msg:'Algunas series quedaron bajo el rango. Repeti este peso la proxima.'};
  if(allMax&&sensOk&&(lastRir==null||lastRir<=2)){
    const nextW=parsePeso(st.kg)||0;
    const sug=nextW?Math.round((nextW+2.5)*2)/2:0;
    return{tipo:'up',msg:'Listo para subir peso la proxima sesion.'+(sug?' Intenta '+sug+' kg.':'')};
  }
  if(allMax&&!sensOk)return{tipo:'hold',msg:'Completado. Mantener peso — el esfuerzo fue alto.'};
  return{tipo:'hold',msg:'Mantene este peso. Proxima vez intenta cerrar '+Array(plan.s).fill(obj).join('/')+'.'};
}
function seEntrenoHoy(){
  const d=gD();return d.ses.some(s=>s.iso===todayISO());
}

function getUltimaSesionHoy(){
  const d=gD();return d.ses.find(s=>s.iso===todayISO());
}

/* progreso */
const EJT=()=>(PLAN[S.dow]||[]).length+([3,6].includes(S.dow)?1:0);
const EJD=()=>S.ejs.filter(e=>e.done).length+([3,6].includes(S.dow)&&S.sogaDone?1:0);
const PCT=()=>{
  const ejs=S.ejs;if(!ejs.length)return 0;
  const t=ejs.reduce((a,e)=>a+(e.series?e.series.length:0),0);if(!t)return 0;
  const d=ejs.reduce((a,e)=>a+(e.series?e.series.filter(s=>s.completed).length:0),0);
  return Math.round((d/t)*100);
};

      cardCls = 'active';

    const opStyle = cardCls==='pending' ? `style="opacity:${opacity}"` : '';

      // DESCANSO
      const hasSeries=st.reps&&st.reps.some(function(r){return parseInt(r)||0;});
      const restInfo=REST_MAP[ej.tipo]||REST_MAP['S'];
      if(hasSeries){

/* ═══════════════ ACCIONES ═══════════════ */
function autoSave(){saveSession();}
function togSoga(){
  S.sogaDone=!S.sogaDone;
  saveSession();
  const sogaEj=document.getElementById('ej-soga');
  if(!sogaEj){renderHoy();return;}
  const done=S.sogaDone;
  const dot=sogaEj.querySelector('.ej-dot');
  if(dot){dot.className='ej-dot'+(done?' done':'');dot.innerHTML=done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':'';}
  const spans=sogaEj.querySelectorAll('span');
  if(spans[0]){spans[0].style.color=done?'var(--tx3)':'var(--tx)';spans[0].style.textDecoration=done?'line-through':'';}
  if(spans[1]){spans[1].textContent=done?'Completado':'Tocá para marcar';spans[1].style.color=done?'rgba(93,214,44,0.75)':'var(--tx3)';}
  sogaEj.className='ej'+(done?' soga-done':'');
}
function expEj(i){
  S.exp=(S.exp===i&&!S.ejs[i]?.done)?-1:i;
  saveSession();
  // Solo cambiar clases — cero innerHTML, cero flash
  document.querySelectorAll('#ejs-container .ej[data-ej-idx]').forEach(function(el){
    const idx=parseInt(el.getAttribute('data-ej-idx'));
    const isActive=idx===S.exp&&!(S.ejs[idx]?.done);
    el.classList.toggle('active',isActive);
    // Pending pierde opacity si se activa (ya tiene la clase active)
    el.classList.toggle('pending',!isActive&&!(S.ejs[idx]?.done));
  });
}
function adjustPeso(i, delta){
  const cur=parsePeso(S.ejs[i].kg)||0;
  const next=Math.max(0,Math.round((cur+delta)*2)/2);
  S.ejs[i].kg=next>0?String(next):'';
  if(S.ejs[i].series)S.ejs[i].series.forEach(function(s){if(!s.completed)s.weight=next||null;});
  autoSave();
  // Actualizar solo el input de peso visible, sin re-render completo
  const inp=document.querySelector('.peso-input');
  if(inp&&document.activeElement!==inp){
    inp.value=next>0?String(next):'';
  }
  // Actualizar el label de recomendación
  const ult=getUlt((PLAN[S.dow]||[])[i]?.n);
  if(ult&&ult.est==='up'){
    const sugerido=Math.round((parsePeso(ult.kg)+2.5)*2)/2;
    const rec=document.querySelector('.peso-rec');
    if(rec)rec.textContent='↑ Subí a '+sugerido+' kg — cumpliste el objetivo';
  }
}
function setKg(i,v){
  S.ejs[i].kg=v;
  const n=parsePeso(v)||null;
  if(S.ejs[i].series)S.ejs[i].series.forEach(function(s){if(!s.completed)s.weight=n;});
  // propagar peso a todas las series no completadas
  if(S.ejs[i].series){S.ejs[i].series.forEach(s=>{if(!s.completed)s.weight=parsePeso(v);});}
}
function setRep(i,s,v){
  const val=parseInt(v)||null;
  if(!S.ejs[i].reps)S.ejs[i].reps=[];
  S.ejs[i].reps[s]=v;
  if(!S.ejs[i].series)S.ejs[i].series=makeSeries(PLAN[S.dow][i].s);
  if(!S.ejs[i].series[s])S.ejs[i].series[s]={setNumber:s+1,reps:null,rir:null,completed:false,weight:null};
  S.ejs[i].series[s].reps=val;
  S.ejs[i].series[s].weight=parsePeso(S.ejs[i].kg)||null;
}
function setSens(i,v){S.ejs[i].sens=v;saveSession();renderHoy();}
function setMol(i,v){S.ejs[i].mol=v;saveSession();renderHoy();}
let _pendingEjIdx=null;
function completarEj(i){
  _pendingEjIdx=i;
  document.getElementById('sens-modal').classList.add('open');
}
function saveSens(v){
  const i=_pendingEjIdx;
  if(i!==null){
    S.ejs[i].sens=v;
    S.ejs[i].done=true;
    // Sincronizar reps[] → series[] y marcar completed
    const plan=(PLAN[S.dow]||[])[i];
    if(!S.ejs[i].series&&plan)S.ejs[i].series=makeSeries(plan.s);
    const reps=S.ejs[i].reps||[];
    reps.forEach(function(r,idx){
      if(!r)return;
      if(!S.ejs[i].series[idx])S.ejs[i].series[idx]={setNumber:idx+1,reps:null,rir:null,completed:false,weight:null};
      if(S.ejs[i].series[idx].reps==null)S.ejs[i].series[idx].reps=parseInt(r)||null;
      if(S.ejs[i].series[idx].reps!=null){
        S.ejs[i].series[idx].completed=true;
        if(!S.ejs[i].series[idx].weight)S.ejs[i].series[idx].weight=parsePeso(S.ejs[i].kg)||null;
      }
    });
    const next=i+1;
    if(next<S.ejs.length)S.exp=next;
    saveSession();
  }
  document.getElementById('sens-modal').classList.remove('open');
  _pendingEjIdx=null;
  // Full render pero preservar scroll position
  const _screen=document.getElementById('screen-hoy');
  const _scrollY=_screen?_screen.scrollTop:0;
  renderHoy();
  requestAnimationFrame(function(){
    if(_screen)_screen.scrollTop=_scrollY;
  });
}

/* ── FOCUS DE SERIE ── */
function openFocus(ejIdx,serieIdx){
  S.focusSerie={ejIdx,serieIdx};
  saveSession();
  renderFocus();
  goToRaw('focus');
}
function goToRaw(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
}
function closeFocus(){
  S.focusSerie=null;
  saveSession();
  goTo('hoy');
}

function focusToast(msg){
  const t=document.getElementById('focus-toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function getDescanso(ejIdx){
  const plan=(PLAN[S.dow]||[])[ejIdx];
  if(!plan)return{min:'90s',desc:'Descansá antes de la próxima serie.'};
  if(plan.p)return{min:'2–3 min',desc:'Ejercicio principal — esperá bien para sostener fuerza.'};
  if(plan.rMax<=10)return{min:'90 s',desc:'Recuperación moderada entre series secundarias.'};
  return{min:'60 s',desc:'Ejercicio de aislamiento — descansá un minuto.'};
}

function completarSerie(){
  const f=S.focusSerie;if(!f)return;
  const {ejIdx,serieIdx}=f;
  const serie=S.ejs[ejIdx].series[serieIdx];
  const repsVal=parseInt(document.getElementById('focus-reps-val')?.value)||0;
  if(!repsVal){focusToast('Ingresá las repeticiones');return;}
  // guardar peso si se editó
  const pesoInput=document.getElementById('focus-peso-edit');
  if(pesoInput&&pesoInput.value) S.ejs[ejIdx].kg=pesoInput.value;
  serie.weight=parsePeso(S.ejs[ejIdx].kg);
  serie.reps=repsVal;
  serie.completed=true;
  // RIR
  const selRir=document.querySelector('.focus-rir-btn.sel');
  if(selRir){
    const rv=selRir.dataset.rir;
    serie.rir=rv==='skip'?null:parseInt(rv);
  }
  saveSession();
  const plan=PLAN[S.dow][ejIdx];
  const totalSeries=plan.s;
  const rest=getDescanso(ejIdx);
  // todas completadas?
  const allDone=S.ejs[ejIdx].series.every(s=>s.completed);
  if(allDone){
    // ir a resumen del ejercicio
    renderEjSummary(ejIdx);
    goToRaw('focus');
  } else {
    // siguiente serie
    const nextIdx=serieIdx+1;
    focusToast('Serie '+(serieIdx+1)+' guardada · Descansá '+rest.min);
    S.focusSerie={ejIdx,serieIdx:nextIdx};
    saveSession();
    setTimeout(()=>renderFocus(),300);
  }
}

function ajustarReps(delta){
  const inp=document.getElementById('focus-reps-val');
  if(!inp)return;
  const v=parseInt(inp.value)||0;
  inp.value=Math.max(0,v+delta);
}

function selRir(btn){
  document.querySelectorAll('.focus-rir-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

  const f=S.focusSerie;

    +' oninput="S.ejs['+ejIdx+'].kg=this.value;saveSession()"></div>'
    +'<div class="focus-meta-unit">kg · por lado</div>'
    +'</div>'
    +'<div class="focus-meta-card">'
    +'<div class="focus-meta-lbl">Objetivo</div>'
    +'<div class="focus-meta-val">'+rLbl+'</div>'
    +'<div class="focus-meta-unit">reps</div>'
    +'</div>'
    +'</div>'

    // reps

    +'</div>'
    +'<div class="focus-reps-hint">Tocá el número para editar</div>'

    // última serie guardada

        +'</div>'
      :ult
        ?'<div class="focus-last" style="color:#848484;background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.06);">'

          +'Última vez: '+ult.kg+' kg'
          +'</div>'

function renderEjSummary(ejIdx){
  if(ejIdx===null||ejIdx===undefined){
    document.getElementById('screen-focus').innerHTML='';return;
  }
  const plan=(PLAN[S.dow]||[])[ejIdx];
  const st=S.ejs[ejIdx];
  if(!plan||!st)return;
  const est=calcEstado(ejIdx);
  const series=st.series||[];
  const repsStr=series.map(s=>s.reps||'—').join(' / ');
  const lastRir=series[series.length-1]?.rir;
  const rLbl=plan.rMin===plan.rMax?String(plan.rMin):plan.rMin+'-'+plan.rMax;
  const checkSvg='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(93,214,44,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  const estColor=est?.tipo==='up'?'rgba(93,214,44,0.85)':est?.tipo==='rev'?'var(--r)':'rgba(249,115,22,0.85)';
  const estLabel=est?.tipo==='up'?'↑ Subir peso':est?.tipo==='rev'?'⚠ Revisar':'→ Mantener peso';

function editarSesionGuardada(){
  const d = gD();
  const hoy = todayISO();
  // Buscar cualquier sesión de hoy (fuerza O running)
  const idx = d.ses.findIndex(s => s.iso === hoy && s.t !== 'skip');
  if(idx === -1){ toast('No hay sesión de hoy para editar'); return; }

  const ses = d.ses[idx];

  if(ses.t === 'running'){
    // Restaurar sesión de running
    S.run = {
      dist: ses.dist || '',
      pace: ses.pace || '',
      dur:  ses.dur  || '',
      sens: ses.sens || null,
      nota: ses.nota || '',
    };
    S.energia = null;
    S.nota = '';
    // Eliminar sesión guardada
    d.ses.splice(idx, 1);
    sD(d);
    saveSession();
    toast('✓ Sesión de running cargada — corregí lo que necesites');
    renderHoy();
    return;
  }

  // Sesión de fuerza
  const plan = PLAN[S.dow] || [];
  S.ejs = plan.map((ej) => {
    const saved = (ses.ejs||[]).find(e => e.n === ej.n);
    if(!saved) return {kg:'', reps:Array(ej.s).fill(''), sens:null, mol:null, done:false};
    // Reconstruir reps desde series[] o reps[] directamente
    let repsArr = Array(ej.s).fill('');
    if(saved.series && saved.series.length){
      repsArr = saved.series.map(s => s.reps != null ? String(s.reps) : '');
    } else if(saved.reps && saved.reps.length){
      repsArr = saved.reps.map(r => r != null ? String(r) : '');
    }
    while(repsArr.length < ej.s) repsArr.push('');
    repsArr = repsArr.slice(0, ej.s);
    return {
      kg: saved.kg || '',
      reps: repsArr,
      sens: saved.sens || null,
      mol: null,
      done: saved.done || false,
    };
  });
  S.exp = 0;
  S.sogaDone = ses.sogaDone || false;
  S.molestia = ses.molestia || null;
  S.molSel = ses.molestia ? [ses.molestia.zona] : [];
  S.energia = null;
  S.nota = '';
  // Eliminar sesión guardada
  d.ses.splice(idx, 1);
  sD(d);
  saveSession();
  toast('✓ Sesión cargada — corregí lo que necesites');
  renderHoy();
}

function dash30(d){
  const n=new Date();
  const h30=new Date(n);h30.setDate(h30.getDate()-30);
  const h60=new Date(n);h60.setDate(h60.getDate()-60);
  const rec=d.ses.filter(s=>new Date(s.iso)>=h30);
  const ant=d.ses.filter(s=>{const f=new Date(s.iso);return f>=h60&&f<h30;});
  const fR=rec.filter(s=>s.t==='fuerza').length,fA=ant.filter(s=>s.t==='fuerza').length;
  const rR=rec.filter(s=>s.t==='running').reduce((a,s)=>a+(parseFloat(s.dist)||0),0);
  const rA=ant.filter(s=>s.t==='running').reduce((a,s)=>a+(parseFloat(s.dist)||0),0);
  const eR=rec.filter(s=>s.energia==='excelente'||s.energia==='bien').length;
  const eA=ant.filter(s=>s.energia==='excelente'||s.energia==='bien').length;
  const rows=[
    ['Fuerza',fR>fA?'Mejorando':fR<fA?'Revisar':'Manteniendo',Math.min((fR/Math.max(fA,1))*60,100)],
    ['Running',rR>rA?'Mejorando':rR<rA?'Revisar':'Manteniendo',Math.min((rR/Math.max(rA,1))*60,100)],
    ['Recuperación',eR>=eA?'Mejorando':'Revisar',rec.length?Math.min((eR/rec.length)*100,100):0],
  ];
  const sC=s=>s==='Mejorando'?'s-up':s==='Manteniendo'?'s-mid':'s-dn';
  const fC=s=>s==='Mejorando'?'d-fill-g':'d-fill-y';
  return`<div class="card cp">
    <div class="p-title">¿Estoy mejor que hace 30 días?</div>
    ${rows.map(([n,s,w])=>`<div class="dash-row">
      <div class="dash-label"><span class="dash-name">${n}</span><span class="${sC(s)}">${s}</span></div>
      <div class="d-track"><div class="${fC(s)}" style="width:${w}%"></div></div>
    </div>`).join('')}
  </div>`;
}

function adh(d){
  const w=weekKey();const ses=d.ses.filter(s=>s.semana===w);
  const f=Math.min(ses.filter(s=>s.t==='fuerza').length,4);
  const r=Math.min(ses.filter(s=>s.t==='running').length,3);
  const score=getScore();
  const sc=score>=85?'rgba(93,214,44,0.85)':score>=70?'var(--y)':'var(--o)';
  return`<div class="card cp">
    <div class="p-title">Adherencia · Esta semana</div>
    <div class="adh-row"><span class="adh-n">Fuerza</span><div class="adh-t"><div class="adh-f" style="width:${(f/4)*100}%"></div></div><span class="adh-num">${f}/4</span></div>
    <div class="adh-row"><span class="adh-n">Running</span><div class="adh-t"><div class="adh-f" style="width:${(r/3)*100}%;opacity:.65;"></div></div><span class="adh-num">${r}/3</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--b);">
      <span style="font-size:14px;color:var(--tx2);">Score semanal</span>

function ppales(d){
  return`<div class="card cp">
    <div class="p-title">5 ejercicios principales</div>
    ${PPALES.map(n=>{
      const ult=getUlt(n);const mej=getMej(n);
      const prog=[];let cnt=0;
      for(const s of d.ses){
        if(s.t!=='fuerza')continue;
        const e=(s.ejs||[]).find(e=>e.n===n);
        if(!e)continue;const kg=parsePeso(e.kg);
        if(kg){prog.push(kg);cnt++;}if(cnt>=5)break;
      }
      prog.reverse();const max=prog.length?Math.max(...prog):1;
      const isPR=ult&&mej&&ult.kg>=mej;
      const subirNext=ult?.est==='up';
      return`<div class="pr-row" onclick="openEjHist('${n}')">
        <div class="pr-top">
          <span class="pr-name">${n}</span>
          <div style="display:flex;align-items:center;">

            ${isPR?`<span class="pr-badge">PR PR</span>`:''}
            <span class="pr-kg" style="margin-left:${isPR?'6':'0'}px;">${mej?mej+' kg':'—'}</span>
          </div>
        </div>
        ${prog.length>1
          ?`<div class="histo">${prog.map((v,j)=>`<div class="hb" style="height:${Math.round((v/max)*100)}%;opacity:${0.2+j*(0.8/prog.length)};"></div>`).join('')}</div>`
          :`<div style="font-size:12px;color:var(--tx3);">Sin registros aún</div>`}
      </div>`;
    }).join('')}

}

function runStats(d){
  const h30=new Date();h30.setDate(h30.getDate()-30);
  const runs=d.ses.filter(s=>s.t==='running'&&new Date(s.iso)>=h30);
  const km=runs.reduce((a,s)=>a+(parsePeso(s.dist)),0);
  const paces=runs.filter(s=>s.pace).map(s=>{const p=s.pace.split(':');return(parseInt(p[0])||0)*60+(parseInt(p[1])||0);});
  const pA=paces.length?Math.round(paces.reduce((a,b)=>a+b,0)/paces.length):0;
  const pS=pA?`${Math.floor(pA/60)}:${String(pA%60).padStart(2,"0")}`:'—';
  const mD=runs.length?Math.max(...runs.map(s=>parsePeso(s.dist))):0;
  return`<div class="card cp">
    <div class="p-title">Running · 30 días</div>
    <div class="rstat">
      <div class="rstat-c"><div class="rstat-v">${km.toFixed(0)}</div><div class="rstat-l">km totales</div></div>
      <div class="rstat-c"><div class="rstat-v">${mD||'—'}</div><div class="rstat-l">fondo máx</div></div>
      <div class="rstat-c"><div class="rstat-v">${pS}</div><div class="rstat-l">pace prom</div></div>
    </div>
  </div>`;
}

function historial(d){
  const all=d.ses;
  if(!all.length) return'<div class="card cp" style="text-align:center;color:var(--tx3);font-size:14px;">Sin sesiones registradas aún.</div>';

  // Agrupar por mes
  const meses=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const byMonthMap={};
  const byMonthOrder=[];
  all.forEach(function(s,i){
    if(!s.fecha)return;
    const parts=s.fecha.split('/');
    const key=parts.length===3?parts[1]+'/'+parts[2]:'';
    if(!key)return;
    const label=(meses[parseInt(key.split('/')[0])]||key.split('/')[0])+' '+key.split('/')[1];
    if(!byMonthMap[key]){byMonthMap[key]={key,label,rows:[]};byMonthOrder.push(key);}
    byMonthMap[key].rows.push({s,i});
  });
  const byMonth=byMonthOrder.map(function(k){return byMonthMap[k];})
  let html='<div class="card"><div style="padding:16px 20px 4px;"><div class="p-title" style="margin-bottom:0;">Historial</div></div>';
  byMonth.forEach(({label,rows},mi)=>{
    if(label) html+='<div style="'+
      (mi===0?'padding:16px 20px 10px;':'padding:14px 20px 8px;border-top:3px solid var(--bg);')+
      'background:var(--s2);">'
      +'<span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);font-family:var(--f);font-weight:600;">'+label+'</span></div>';
    rows.forEach(({s,i})=>{ html+=historialSesRow(s,i); });
  });
  html+='</div>';
  return html;
}

function getWeekSessions(){
  const d=gD();const w=weekKey();
  const ses=d.ses.filter(s=>s.semana===w&&s.t!=='skip');
  return{
    fuerza:ses.filter(s=>s.t==='fuerza').length,
    running:ses.filter(s=>s.t==='running').length,
  };
}
function isoWeekKey(isoStr){
  var d=new Date(isoStr);if(isNaN(d.getTime()))return'';
  d.setHours(0,0,0,0);d.setDate(d.getDate()+4-(d.getDay()||7));
  var y=new Date(d.getFullYear(),0,1);
  return d.getFullYear()+'-W'+String(Math.ceil((((d-y)/86400000)+1)/7)).padStart(2,'0');
}
function getStreakWeeks(){
  var d=gD();if(!d.ses.length)return 0;
  var byWeek={};
  d.ses.forEach(function(s){
    if(s.t==='skip')return;
    var w=s.iso?isoWeekKey(s.iso):(s.semana||'');
    if(!w)return;
    if(!byWeek[w])byWeek[w]=0;
    byWeek[w]++;
  });
  var streak=0;
  var today=new Date();
  for(var i=0;i<52;i++){
    var ref=new Date(today);ref.setDate(ref.getDate()-i*7);
    var w=isoWeekKey(ref.toISOString().slice(0,10));
    if(byWeek[w]>=2)streak++;
    else if(i>0)break;
  }
  return streak;
}

function renderRingsSVG(done, total, color, icon){
  const r=28;const cx=36;const cy=36;
  const circumference=2*Math.PI*r;
  const gap=4;// gap entre segmentos en grados
  const segAngle=(360/total);
  const gapAngle=gap;
  const fillAngle=segAngle-gapAngle;
  const segments=[];
  for(let i=0;i<total;i++){
    const startAngle=-90+(i*segAngle);
    const endAngle=startAngle+fillAngle;
    const filled=i<done;
    const s1=startAngle*(Math.PI/180);
    const e1=endAngle*(Math.PI/180);
    const x1=cx+r*Math.cos(s1);const y1=cy+r*Math.sin(s1);
    const x2=cx+r*Math.cos(e1);const y2=cy+r*Math.sin(e1);
    const large=fillAngle>180?1:0;
    const col=filled?color:'rgba(255,255,255,0.08)';
    segments.push(`<path d="M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}" stroke="${col}" stroke-width="6" fill="none" stroke-linecap="round"/>`);
  }
  return`<svg class="ring-svg ${done>=total?'ring-complete':''}" width="72" height="72" viewBox="0 0 72 72">
    ${segments.join('')}
    ${icon}
  </svg>`;
}

/* ═══════════════ SKIP SESSION ═══════════════ */
let _skipMotivo=null;
function openSkip(){
  _skipMotivo=null;
  document.querySelectorAll('.skip-opt').forEach(b=>b.classList.remove('sel'));
  document.getElementById('skip-modal').classList.add('open');
}
function closeSkip(e){if(e.target===document.getElementById('skip-modal'))document.getElementById('skip-modal').classList.remove('open');}
function selSkip(btn,motivo){
  document.querySelectorAll('.skip-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');_skipMotivo=motivo;
}
function saveSkip(){
  if(!_skipMotivo){document.getElementById('skip-modal').classList.remove('open');return;}
  const d=gD();
  d.ses.unshift({t:'skip',fecha:todayLbl(),iso:todayISO(),semana:weekKey(),motivo:_skipMotivo});
  sD(d);
  document.getElementById('skip-modal').classList.remove('open');
  toast('Día registrado');
  renderHoy();
}

/* ═══════════════ ENERGÍA POST-SESIÓN ═══════════════ */
let _pendingGuardar = null; // 'fuerza' o 'running'

function openEnergiaModal(tipo){
  _pendingGuardar = tipo;
  S._pendingEnergia = null;
  // reset botones
  document.querySelectorAll('#energia-modal .en-btn').forEach(b=>b.className='en-btn');
  document.getElementById('energia-nota').value = '';
  document.getElementById('energia-modal').classList.add('open');
}

function saveEnergia(v){
  S.energia = v;
  S.nota = document.getElementById('energia-nota').value.trim();
  document.getElementById('energia-modal').classList.remove('open');
  // highlight botón seleccionado brevemente
  if(_pendingGuardar==='fuerza') _commitGuardarF();
  else if(_pendingGuardar==='running') _commitGuardarR();
}

function skipEnergia(){
  S.energia = null;
  document.getElementById('energia-modal').classList.remove('open');
  if(_pendingGuardar==='fuerza') _commitGuardarF();
  else if(_pendingGuardar==='running') _commitGuardarR();
}

function selectEnergia(v){
  ['excelente','bien','cansado','muy-cansado'].forEach(function(k){
    const el=document.getElementById('en-'+k);
    if(el)el.className='en-btn';
  });
  const map={'excelente':'sel-exc','bien':'sel-bien','cansado':'sel-can','muy-cansado':'sel-muy'};
  const el=document.getElementById('en-'+v);
  if(el)el.classList.add(map[v]||'');
  S._pendingEnergia=v;
  S.energia=v;
}

/* ═══════════════ HISTORIAL POR EJERCICIO ═══════════════ */
function openEjHist(nombre){
  const panel = document.getElementById('ej-hist-panel');
  const titleEl = document.getElementById('ej-hist-nombre');
  const badgeEl = document.getElementById('ej-hist-badge');
  const contentEl = document.getElementById('ej-hist-content');

  titleEl.textContent = nombre;

  const d = gD();
  const sesiones = d.ses.filter(s => s.t === 'fuerza');
  const registros = [];

  for(const s of sesiones){
    const ej = (s.ejs||[]).find(e => e.n === nombre);
    if(!ej || !ej.kg) continue;
    const reps=(ej.series||[]).filter(x=>x.reps).map(x=>x.reps).join(' / ')||(ej.reps||[]).filter(r=>r).join(' / ');
    registros.push({
      fecha: s.fecha,
      iso: s.iso,
      kg: parsePeso(ej.kg),
      reps,
      est: ej.est,
      sens: ej.sens,
    });
  }

  // Badge mejor marca
  const kgs = registros.map(r=>r.kg).filter(Boolean);
  const mejor = kgs.length ? Math.max(...kgs) : null;
  badgeEl.textContent = mejor ? mejor + ' kg PR' : '';

  if(!registros.length){
    contentEl.innerHTML = '<div class="ejh-empty">Sin registros aún.<br>Completá el ejercicio para ver tu historial.</div>';
    panel.classList.add('open');
    return;
  }

  const estLabel = {up:'↑ Subir', hold:'→ Mantener', mantener:'→ Mantener', rev:'⚠ Revisar'};
  const estCls = {up:'up', hold:'hold', mantener:'hold', rev:'rev'};

  contentEl.innerHTML = registros.map((r,i) => {
    const isPR = r.kg >= (mejor||0) && i === registros.findIndex(x=>x.kg===mejor);
    return '<div class="ejh-row">'
      + '<div class="ejh-fecha">' + r.fecha + (isPR ? ' <span style="color:var(--y);font-weight:600;">PR</span>' : '') + '</div>'
      + '<div class="ejh-main">'
      +   '<div class="ejh-kg">' + r.kg + '<span> kg</span></div>'
      +   (r.est && estLabel[r.est] ? '<span class="ejh-est ' + (estCls[r.est]||'') + '">' + estLabel[r.est] + '</span>' : '')
      + '</div>'
      + (r.reps ? '<div class="ejh-reps">' + r.reps + ' reps</div>' : '')
      + '</div>';
  }).join('');

  panel.classList.add('open');
}

function openMananaPreview(dow){
  // El día de mañana
  const manDow = (dow + 1) % 7;
  const manDia = DIAS[manDow];
  const plan = PLAN[manDow] || [];
  const isRun = manDia.t === 'running';

  let html = '<div style="margin-bottom:18px;">'
    + '<div class="ey" style="margin-bottom:6px;">' + manDia.n + '</div>'
    + '<div style="font-size:20px;font-weight:600;color:var(--tx);letter-spacing:0.3px;font-family:var(--fd);">' + manDia.l + '</div>'
    + '</div>';

  if(isRun){
    const tipo = runTipo(manDow);
    const desc = RUN_DESC[tipo] || '';
    html += '<div style="background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:14px 16px;">'
      + '<div style="font-size:13px;font-weight:600;color:rgba(93,214,44,0.85);margin-bottom:6px;">' + tipo + '</div>'
      + '<div style="font-size:13px;color:var(--tx2);line-height:1.6;">' + desc + '</div>'
      + '</div>';
  } else {
    html += '<div style="margin-bottom:10px;">';
    plan.forEach(function(ej){
      const rLbl = ej.rMin===ej.rMax ? String(ej.rMin) : ej.rMin+'-'+ej.rMax;
      const ult = getUlt(ej.n);
      html += '<div class="manana-preview-ej">'
        + '<span class="manana-preview-ej-name">' + (ej.p ? '★ ' : '') + ej.n + '</span>'
        + '<div style="text-align:right;">'
        + '<span class="manana-preview-ej-obj">' + ej.s + '×' + rLbl + '</span>'
        + (ult ? '<div style="font-size:11px;color:var(--tx3);margin-top:2px;">' + ult.kg + ' kg</div>' : '')
        + '</div>'
        + '</div>';
    });
    if([3,6].includes(manDow)){
      html += '<div class="manana-preview-ej"><span class="manana-preview-ej-name">Soga + Core</span><span class="manana-preview-ej-obj">—</span></div>';
    }
    html += '</div>';
  }

  document.getElementById('manana-preview-content').innerHTML = html;
  document.getElementById('manana-modal').classList.add('open');
}

function closeMananaPreview(e){
  if(e.target === document.getElementById('manana-modal'))
    document.getElementById('manana-modal').classList.remove('open');
}

function openSesPanel(idxOrObj){
  document.getElementById('ses-panel-titulo').textContent = ses.lbl || ses.tipo || 'Sesión';
  document.getElementById('ses-panel-fecha').textContent = ses.fecha || '';

  const badgeEl = document.getElementById('ses-panel-badge');
  if(ses.t==='running'){
    badgeEl.innerHTML = '<span class="hbadge hb-r">Running</span>';
  } else {
    const rev = ses.molestia || (ses.ejs||[]).some(e=>e.est==='rev');
    badgeEl.innerHTML = '<span class="hbadge '+(rev?'hb-rev':'hb-f')+'">'+(rev?'Revisar':'Fuerza')+'</span>';
  }

  let html = '';

  if(ses.t==='running'){
    html += '<div class="ses-ej-row">'
      + '<div class="ses-ej-nombre">' + (ses.tipo||'Running') + '</div>'
      + (ses.dist ? '<div class="ses-ej-kg">Distancia: ' + ses.dist + ' km</div>' : '')
      + (ses.pace ? '<div class="ses-ej-reps">Pace: ' + ses.pace + ' min/km</div>' : '')
      + (ses.dur ? '<div class="ses-ej-reps">Duración: ' + ses.dur + '</div>' : '')
      + (ses.energia ? '<div class="ses-ej-reps" style="margin-top:6px;">Energía: ' + ses.energia + '</div>' : '')
      + (ses.nota ? '<div class="ses-ej-reps" style="color:var(--tx3);margin-top:4px;">"' + ses.nota + '"</div>' : '')
      + '</div>';
  } else {
    // fuerza
    if(ses.sogaDone){
      html += '<div class="ses-ej-row"><div class="ses-ej-nombre">Soga + Core</div>'
        + '<div class="ses-ej-reps" style="color:rgba(93,214,44,0.7);">✓ Completado</div></div>';
    }
    (ses.ejs||[]).forEach(function(ej){
      if(!ej.kg&&!(ej.series||[]).some(s=>s.reps)&&!(ej.reps||[]).some(r=>r))return;
      const estMap = {up:'up',hold:'hold',mantener:'hold',rev:'rev'};
      const estLbl = {up:'↑ Subir peso',hold:'→ Mantener',mantener:'→ Mantener',rev:'⚠ Revisar'};
      const reps=(ej.series||[]).filter(s=>s.reps).map(s=>s.reps).join(' / ')||(ej.reps||[]).filter(r=>r).join(' / ');
      html += '<div class="ses-ej-row">'
        + '<div class="ses-ej-nombre">' + ej.n + '</div>'
        + (ej.kg ? '<div class="ses-ej-kg">' + ej.kg + ' kg por lado</div>' : '')
        + (reps ? '<div class="ses-ej-reps">' + reps + ' reps</div>' : '')
        + (ej.est && estLbl[ej.est] ? '<span class="ses-ej-est '+(estMap[ej.est]||'')+'">' + estLbl[ej.est] + '</span>' : '')
        + '</div>';
    });
    if(ses.molestia){
      html += '<div class="ses-ej-row" style="border-color:rgba(248,113,113,0.2);">'
        + '<div class="ses-ej-nombre" style="color:var(--r);">⚠ Molestia</div>'
        + '<div class="ses-ej-reps">' + ses.molestia.zona + '</div>'
        + (ses.molestia.nota ? '<div class="ses-ej-reps" style="color:var(--tx3);">"' + ses.molestia.nota + '"</div>' : '')
        + '</div>';
    }
    if(ses.energia){
      html += '<div style="padding:10px 0;border-top:1px solid var(--b);margin-top:4px;">'
        + '<div style="font-size:12px;color:var(--tx3);">Energía post-sesión: <span style="color:var(--tx2);">'
        + ses.energia + '</span></div>'
        + (ses.nota ? '<div style="font-size:12px;color:var(--tx3);margin-top:4px;">"' + ses.nota + '"</div>' : '')
        + '</div>';
    }
  }

  document.getElementById('ses-panel-content').innerHTML = html;
  document.getElementById('ses-panel').classList.add('open');
}

function closeSesPannel(){
  document.getElementById('ses-panel').classList.remove('open');
}

function closeEjHist(){
  document.getElementById('ej-hist-panel').classList.remove('open');
}

/* ═══════════════ EDITAR EJ ═══════════════ */
function editarEj(i){
  const plan = (PLAN[S.dow]||[])[i];
  const st = S.ejs[i];
  // Preservar kg y reps de las series ya completadas
  // Solo desmarcar completed=false para que se puedan editar
  if(st.series){
    st.series.forEach(s => { s.completed = false; });
  }
  st.done = false;
  st.sens = null;
  S.exp = i;
  saveSession();
  renderHoy();
}

// Swipe hacia la derecha para cerrar paneles
(function(){
  let startX = 0, startY = 0;
  const THRESHOLD = 80; // px mínimos para considerar swipe
  const ANGLE = 30;     // grados máximos de desviación vertical

  function onStart(e){
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX;
    startY = t.clientY;
  }
  function onEnd(e){
    const t = e.changedTouches ? e.changedTouches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);
    if(dx > THRESHOLD && angle < ANGLE){
      // swipe derecha
      const ejPanel = document.getElementById('ej-hist-panel');
      const sesPanel = document.getElementById('ses-panel');
      if(ejPanel && ejPanel.classList.contains('open')) closeEjHist();
      else if(sesPanel && sesPanel.classList.contains('open')) closeSesPannel();
    }
  }
  document.addEventListener('touchstart', onStart, {passive:true});
  document.addEventListener('touchend', onEnd, {passive:true});
})();

// Event delegation para manana preview
document.addEventListener('click', function(e){
  const mananaRow = e.target.closest('#manana-row, .done-manana');

});
